services:
  frontend:
    build: ./frontend
    container_name: voxa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - voxa-internal
      - coolify

  backend:
    build: ./backend
    container_name: voxa-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - voxa-internal
      - coolify

  celery-worker:
    build: ./backend
    container_name: voxa-celery
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --autoscale=4,1
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voxa-internal

  postgres:
    image: postgres:16-alpine
    container_name: voxa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voxa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-voxa}
    volumes:
      - voxa_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voxa-internal

  redis:
    image: redis:7-alpine
    container_name: voxa-redis
    restart: unless-stopped
    volumes:
      - voxa_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voxa-internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: voxa-qdrant
    restart: unless-stopped
    volumes:
      - voxa_qdrant:/qdrant/storage
    networks:
      - voxa-internal

volumes:
  voxa_postgres:
  voxa_redis:
  voxa_qdrant:

networks:
  voxa-internal:
    driver: bridge
  coolify:
    external: true
